spring:
  application:
    name: LogMyPos-Backend
  config:
    import: optional:file:.env[.properties]
  datasource:
    url: ${DB_URL}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: update

jwt:
  secret: ${JWT_SECRET}
  expiration-ms: 3600000

springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /docs

supabase:
  storage:
    endpoint-url: ${SUPABASE_S3_ENDPOINT_URL:https://kbkldkpfpccfkxhrxnwq.storage.supabase.co/storage/v1/s3}
    public-endpoint-url: ${SUPABASE_S3_ENDPOINT_URL:https://kbkldkpfpccfkxhrxnwq.storage.supabase.co/storage/v1/object/public}
    bucket: ${SUPABASE_STORAGE_BUCKET:profile-images}
    access-key: ${SUPABASE_S3_ACCESS_KEY}
    secret-key: ${SUPABASE_S3_SECRET_KEY}
    region: ${SUPABASE_S3_REGION:eu-west-2}
